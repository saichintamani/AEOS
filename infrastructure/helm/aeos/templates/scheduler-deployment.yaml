{{- if .Values.scheduler.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aeos.fullname" . }}-scheduler
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aeos.labels" . | nindent 4 }}
    app.kubernetes.io/component: scheduler
  annotations:
    checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
spec:
  replicas: {{ .Values.scheduler.replicaCount }}
  strategy:
    type: Recreate   # Only one scheduler active at a time

  selector:
    matchLabels:
      {{- include "aeos.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: scheduler

  template:
    metadata:
      labels:
        {{- include "aeos.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: scheduler
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"

    spec:
      serviceAccountName: {{ include "aeos.serviceAccountName" . }}
      terminationGracePeriodSeconds: 30

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      containers:
      - name: scheduler
        image: {{ include "aeos.image" (dict "Values" .Values "image" .Values.scheduler.image) }}
        imagePullPolicy: {{ .Values.scheduler.image.pullPolicy }}
        command: ["python", "-m", "app.scheduler"]
        ports:
        - name: metrics
          containerPort: 9091
          protocol: TCP

        envFrom:
        - configMapRef:
            name: {{ include "aeos.fullname" . }}-config

        env:
        - name: SCHEDULER_MODE
          value: "true"
        {{- range .Values.externalSecrets.secrets }}
        - name: {{ .envKey | default .name | upper | replace "-" "_" }}
          valueFrom:
            secretKeyRef:
              name: {{ .name }}
              key: {{ .secretKey | default "value" }}
        {{- end }}
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace

        resources:
          {{- toYaml .Values.scheduler.resources | nindent 10 }}

        livenessProbe:
          httpGet:
            path: /health
            port: metrics
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health/ready
            port: metrics
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2

        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]

        volumeMounts:
        - name: tmp
          mountPath: /tmp

      volumes:
      - name: tmp
        emptyDir: {}

      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
