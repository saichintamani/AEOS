## Istio DestinationRules — traffic policy, circuit breaking, and mTLS for AEOS services.

## API service — connection pool limits + outlier detection
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: aeos-api
  namespace: aeos-api
  labels:
    app.kubernetes.io/part-of: aeos
spec:
  host: aeos-api.aeos-api.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    connectionPool:
      tcp:
        maxConnections: 100
        connectTimeout: 5s
      http:
        http2MaxRequests: 1000
        maxRequestsPerConnection: 100
        maxRetries: 3
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  subsets:
  - name: stable
    labels:
      version: v1
  - name: canary
    labels:
      version: v2
---
## Redis — TCP connection pool + mTLS
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: redis
  namespace: aeos-data
  labels:
    app.kubernetes.io/part-of: aeos
spec:
  host: redis-client.aeos-data.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    connectionPool:
      tcp:
        maxConnections: 50
        connectTimeout: 3s
        tcpKeepalive:
          time: 7200s
          interval: 75s
    outlierDetection:
      consecutiveGatewayErrors: 3
      interval: 10s
      baseEjectionTime: 30s
---
## Qdrant — gRPC + HTTP connection pool
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: qdrant
  namespace: aeos-data
  labels:
    app.kubernetes.io/part-of: aeos
spec:
  host: qdrant-client.aeos-data.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    connectionPool:
      tcp:
        maxConnections: 50
      http:
        http2MaxRequests: 500
        maxRequestsPerConnection: 50
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 30s
      baseEjectionTime: 60s
