## Gateway — external HTTPS ingress via Istio Ingress Gateway
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: aeos-gateway
  namespace: aeos-api
  labels:
    app.kubernetes.io/part-of: aeos
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 443
      name: https
      protocol: HTTPS
    tls:
      mode: SIMPLE
      credentialName: aeos-tls-cert   # K8s secret with TLS cert/key
    hosts:
    - "api.aeos.example.com"
  - port:
      number: 80
      name: http
      protocol: HTTP
    tls:
      httpsRedirect: true
    hosts:
    - "api.aeos.example.com"
---
## VirtualService attached to Gateway — routes external traffic to API service
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: aeos-api-external
  namespace: aeos-api
  labels:
    app.kubernetes.io/part-of: aeos
spec:
  hosts:
  - "api.aeos.example.com"
  gateways:
  - aeos-gateway
  http:
  - name: api-external-route
    timeout: 60s
    retries:
      attempts: 2
      perTryTimeout: 30s
      retryOn: gateway-error,connect-failure
    route:
    - destination:
        host: aeos-api.aeos-api.svc.cluster.local
        subset: stable
      weight: 100
