## Istio VirtualServices — traffic routing, retries, timeouts, and canary splits.

## API VirtualService — production traffic (100% stable)
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: aeos-api
  namespace: aeos-api
  labels:
    app.kubernetes.io/part-of: aeos
spec:
  hosts:
  - aeos-api.aeos-api.svc.cluster.local
  http:
  - name: api-route
    timeout: 30s
    retries:
      attempts: 3
      perTryTimeout: 10s
      retryOn: gateway-error,connect-failure,retriable-4xx
    route:
    - destination:
        host: aeos-api.aeos-api.svc.cluster.local
        subset: stable
      weight: 100
---
## API VirtualService — canary deployment (95/5 split)
## Apply this manifest during a canary rollout, then shift traffic gradually.
## Kept separate so normal deployments don't accidentally enable it.
