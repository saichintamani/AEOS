## AEOS Scheduler Deployment
## Singleton (1 replica) — responsible for task routing decisions via Raft leader lease.
## Uses leader election via Redis lease to ensure only one active scheduler at a time.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: aeos-scheduler
  namespace: aeos-api
  labels:
    app.kubernetes.io/name: aeos-scheduler
    app.kubernetes.io/component: scheduler
    app.kubernetes.io/part-of: aeos
    version: v1
spec:
  replicas: 1
  # Recreate strategy — only one scheduler runs at a time (leader lease enforced in-app)
  strategy:
    type: Recreate

  selector:
    matchLabels:
      app: aeos-scheduler

  template:
    metadata:
      labels:
        app: aeos-scheduler
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"

    spec:
      serviceAccountName: aeos-api-sa
      terminationGracePeriodSeconds: 30

      containers:
      - name: scheduler
        image: REGISTRY_PLACEHOLDER/aeos-api:VERSION_PLACEHOLDER
        command: ["python", "-m", "app.scheduler"]
        ports:
        - name: metrics
          containerPort: 9091
          protocol: TCP

        envFrom:
        - configMapRef:
            name: aeos-config

        env:
        - name: SCHEDULER_MODE
          value: "true"
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: aeos-external-secrets
              key: redis_url
        - name: KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: aeos-config
              key: KAFKA_BOOTSTRAP_SERVERS
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace

        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi

        livenessProbe:
          httpGet:
            path: /health
            port: metrics
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health/ready
            port: metrics
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2

        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]

        volumeMounts:
        - name: tmp
          mountPath: /tmp

      volumes:
      - name: tmp
        emptyDir: {}

      imagePullSecrets:
      - name: ecr-pull-secret
---
## Scheduler metrics service
apiVersion: v1
kind: Service
metadata:
  name: aeos-scheduler
  namespace: aeos-api
  labels:
    app.kubernetes.io/name: aeos-scheduler
    app.kubernetes.io/component: scheduler
    app.kubernetes.io/part-of: aeos
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9091"
spec:
  type: ClusterIP
  selector:
    app: aeos-scheduler
  ports:
  - name: metrics
    port: 9091
    targetPort: 9091
    protocol: TCP
