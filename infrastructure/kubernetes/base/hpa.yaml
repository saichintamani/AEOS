## HPA: API Service
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aeos-api-hpa
  namespace: aeos-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aeos-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
  # Primary trigger: CPU
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  # Secondary trigger: memory
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  # Custom metric: requests per second (via Prometheus adapter)
  - type: Pods
    pods:
      metric:
        name: http_requests_per_second
      target:
        type: AverageValue
        averageValue: "1000"
  behavior:
    # Scale-down: conservative — 5 min stabilization, max 50% reduction/min
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    # Scale-up: aggressive — no stabilization, doubles per 15s
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 4
        periodSeconds: 15
      selectPolicy: Max
---
## HPA: Background Workers
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aeos-worker-hpa
  namespace: aeos-jobs
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aeos-worker
  minReplicas: 2
  maxReplicas: 50
  metrics:
  - type: External
    external:
      metric:
        name: sqs_approximate_number_of_messages_visible
        selector:
          matchLabels:
            queue: aeos-jobs
      target:
        type: AverageValue
        averageValue: "5"   # 1 worker per 5 messages in queue
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Pods
        value: 10
        periodSeconds: 30
