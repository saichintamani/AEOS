## AWS ALB Ingress for AEOS API
## Requires: aws-load-balancer-controller installed on EKS
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aeos-ingress
  namespace: aeos-api
  annotations:
    # ALB controller annotations
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip   # Direct pod routing

    # TLS
    alb.ingress.kubernetes.io/certificate-arn: ACM_CERT_ARN_PLACEHOLDER
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"

    # Health checks
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"

    # WAF (Web Application Firewall)
    alb.ingress.kubernetes.io/wafv2-acl-arn: WAF_ACL_ARN_PLACEHOLDER

    # Load balancing algorithm
    alb.ingress.kubernetes.io/load-balancer-attributes: >
      routing.http2.enabled=true,
      idle_timeout.timeout_seconds=60,
      access_logs.s3.enabled=true,
      access_logs.s3.bucket=aeos-alb-logs

    # Tags
    alb.ingress.kubernetes.io/tags: env=production,team=platform
spec:
  rules:
  - host: api.aeos.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: aeos-api
            port:
              number: 80
