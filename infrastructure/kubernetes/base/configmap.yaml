apiVersion: v1
kind: ConfigMap
metadata:
  name: aeos-config
  namespace: aeos-api
  labels:
    app.kubernetes.io/name: aeos
    app.kubernetes.io/component: config
data:
  # Service endpoints (cluster-internal DNS)
  REDIS_URL: "redis://aeos-redis.aeos-data.svc.cluster.local:6379/0"
  CELERY_BROKER_URL: "redis://aeos-redis.aeos-data.svc.cluster.local:6379/1"
  QDRANT_URL: "http://aeos-qdrant.aeos-data.svc.cluster.local:6333"

  # Application settings
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  LOG_JSON: "true"
  DEBUG: "false"

  # OpenTelemetry
  OTEL_ENABLED: "true"
  OTEL_SERVICE_NAME: "aeos-api"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger-collector.aeos-monitoring.svc.cluster.local:4318"

  # Worker settings
  CELERY_WORKER_CONCURRENCY: "4"
  CELERY_MAX_TASKS_PER_CHILD: "100"

  # Cache TTLs (seconds)
  CACHE_TTL_DEFAULT: "3600"
  CACHE_TTL_REPORTS: "86400"

  # Rate limiting
  RATE_LIMIT_ANONYMOUS: "60"
  RATE_LIMIT_USER: "600"
  RATE_LIMIT_ADMIN: "6000"
