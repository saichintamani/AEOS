## Namespace creation with Pod Security Standards labels
## Applied before any workloads — PSA enforces restricted profile at admission.
apiVersion: v1
kind: Namespace
metadata:
  name: aeos-api
  labels:
    app.kubernetes.io/part-of: aeos
    environment: production
    team: platform
    kubernetes.io/metadata.name: aeos-api
    # Pod Security Admission — restricted profile for AEOS API namespace
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: v1.29
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: aeos-jobs
  labels:
    app.kubernetes.io/part-of: aeos
    environment: production
    team: platform
    kubernetes.io/metadata.name: aeos-jobs
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: v1.29
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: aeos-data
  labels:
    app.kubernetes.io/part-of: aeos
    environment: production
    team: platform
    kubernetes.io/metadata.name: aeos-data
    # Data namespace uses baseline (Redis/Qdrant need non-readonly rootfs)
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/enforce-version: v1.29
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: aeos-monitoring
  labels:
    app.kubernetes.io/part-of: aeos
    environment: production
    team: platform
    kubernetes.io/metadata.name: aeos-monitoring
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/enforce-version: v1.29
