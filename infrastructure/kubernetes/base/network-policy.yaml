kind: NetworkPolicy
metadata:
  name: allow-worker-egress
  namespace: aeos-jobs
spec:
  podSelector:
    matchLabels:
      app: aeos-worker
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: aeos-data
    ports:
    - port: 6379
      protocol: TCP
    - port: 9092
      protocol: TCP
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
  - ports:
    - port: 443
      protocol: TCP

