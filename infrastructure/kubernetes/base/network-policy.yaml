## Zero Trust Network Policies — default-deny everything, then explicitly allow.
## All policies follow the principle: if it's not listed, it's blocked.

## ─── aeos-api namespace ────────────────────────────────────────────────────

## Default deny all ingress and egress in aeos-api
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: aeos-api
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
## Allow ingress to API on port 8000 from ALB and within namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-ingress
  namespace: aeos-api
spec:
  podSelector:
    matchLabels:
      app: aeos-api
  policyTypes:
  - Ingress
  ingress:
  # From ALB ingress controller (kube-system namespace)
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - port: 8000
      protocol: TCP
  # From within same namespace (health checks, internal calls)
  - from:
    - podSelector: {}
    ports:
    - port: 8000
      protocol: TCP
---
## Allow API egress to data layer and external services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-egress
  namespace: aeos-api
spec:
  podSelector:
    matchLabels:
      app: aeos-api
  policyTypes:
  - Egress
  egress:
  # Redis (aeos-data namespace)
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: aeos-data
    ports:
    - port: 6379
      protocol: TCP
  # Qdrant (aeos-data namespace)
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: aeos-data
    ports:
    - port: 6333
      protocol: TCP
    - port: 6334
      protocol: TCP
  # Kafka (aeos-data namespace)
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: aeos-data
    ports:
    - port: 9092
      protocol: TCP
  # DNS (kube-dns)
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
  # External HTTPS (GitHub, OpenAI, OTLP collector)
  - ports:
    - port: 443
      protocol: TCP
    - port: 4317
      protocol: TCP
---
## Allow Prometheus to scrape API metrics
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape-api
  namespace: aeos-api
spec:
  podSelector:
    matchLabels:
      app: aeos-api
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: aeos-monitoring
    ports:
    - port: 8000
      protocol: TCP

---
