## ─── aeos-data namespace ───────────────────────────────────────────────────

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: aeos-data
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
## Allow Redis ingress from api and worker namespaces only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-ingress
  namespace: aeos-data
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: aeos-api
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: aeos-jobs
    ports:
    - port: 6379
      protocol: TCP
---
## Allow Redis egress for replication between pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-egress
  namespace: aeos-data
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - port: 6379
      protocol: TCP
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
---
