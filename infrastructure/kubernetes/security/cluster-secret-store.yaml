## ClusterSecretStore — External Secrets Operator connecting to AWS Secrets Manager.
## This single store is referenced by ExternalSecret resources in all namespaces.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  labels:
    app.kubernetes.io/part-of: aeos
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets
---
## Service Account for ESO with IRSA annotation (role ARN set at deploy time)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa
  namespace: external-secrets
  labels:
    app.kubernetes.io/part-of: aeos
  annotations:
    eks.amazonaws.com/role-arn: ""   # Set by Helm/kustomize at deploy time
---
## ExternalSecret — AEOS API credentials pulled from Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: aeos-api-secrets
  namespace: aeos-api
  labels:
    app.kubernetes.io/part-of: aeos
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: aeos-external-secrets
    creationPolicy: Owner
  dataFrom:
  - extract:
      key: aeos/production/api-secrets
---
## ExternalSecret — AEOS DB credentials
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: aeos-db-secrets
  namespace: aeos-api
  labels:
    app.kubernetes.io/part-of: aeos
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: aeos-db-secret
    creationPolicy: Owner
  data:
  - secretKey: url
    remoteRef:
      key: aeos/production/database
      property: url
  - secretKey: host
    remoteRef:
      key: aeos/production/database
      property: host
---
## ExternalSecret — Redis credentials (worker namespace)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: aeos-redis-secrets
  namespace: aeos-data
  labels:
    app.kubernetes.io/part-of: aeos
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: aeos-redis-secret
    creationPolicy: Owner
  data:
  - secretKey: password
    remoteRef:
      key: aeos/production/redis
      property: auth_token
