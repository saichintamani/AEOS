## AlertManager configuration for AEOS production.
## Routes alerts by severity, component, and environment.

global:
  resolve_timeout: 5m
  slack_api_url: "${SLACK_WEBHOOK_URL}"   # Injected from K8s secret

templates:
- '/etc/alertmanager/templates/*.tmpl'

route:
  group_by: ['alertname', 'component', 'environment']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default-receiver'

  routes:
  # Critical: page oncall immediately, no grouping delay
  - match:
      severity: critical
    receiver: pagerduty-oncall
    group_wait: 0s
    repeat_interval: 30m
    continue: true   # Also send to Slack

  # Critical: also post to Slack #incidents
  - match:
      severity: critical
    receiver: slack-incidents

  # Warning: Slack only
  - match:
      severity: warning
    receiver: slack-warnings
    group_wait: 1m
    repeat_interval: 2h

  # Invariant violations: always page (system correctness)
  - match:
      alertname: AEOSInvariantViolation
    receiver: pagerduty-oncall
    group_wait: 0s

  # Infrastructure alerts: SRE Slack channel
  - match:
      layer: infrastructure
    receiver: slack-sre

receivers:
- name: 'default-receiver'
  slack_configs:
  - channel: '#aeos-alerts'
    title: '[{{ .Status | toUpper }}] {{ .CommonAnnotations.summary }}'
    text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

- name: 'pagerduty-oncall'
  pagerduty_configs:
  - routing_key: "${PAGERDUTY_ROUTING_KEY}"
    description: '{{ .CommonAnnotations.summary }}'
    severity: '{{ if eq .CommonLabels.severity "critical" }}critical{{ else }}warning{{ end }}'
    client: 'AEOS AlertManager'
    client_url: 'https://grafana.aeos.example.com'
    details:
      component: '{{ .CommonLabels.component }}'
      environment: '{{ .CommonLabels.environment }}'
      runbook: '{{ .CommonAnnotations.runbook_url }}'

- name: 'slack-incidents'
  slack_configs:
  - channel: '#incidents'
    send_resolved: true
    color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
    title: ':fire: CRITICAL: {{ .CommonAnnotations.summary }}'
    text: |
      *Environment:* {{ .CommonLabels.environment }}
      *Component:* {{ .CommonLabels.component }}
      *Description:* {{ .CommonAnnotations.description }}
      *Runbook:* {{ .CommonAnnotations.runbook_url }}

- name: 'slack-warnings'
  slack_configs:
  - channel: '#aeos-alerts'
    send_resolved: true
    color: '{{ if eq .Status "firing" }}warning{{ else }}good{{ end }}'
    title: ':warning: {{ .CommonAnnotations.summary }}'
    text: '{{ .CommonAnnotations.description }}'

- name: 'slack-sre'
  slack_configs:
  - channel: '#sre-alerts'
    send_resolved: true
    title: '[{{ .Status | toUpper }}] Infra: {{ .CommonAnnotations.summary }}'
    text: '{{ .CommonAnnotations.description }}'

inhibit_rules:
# Suppress warnings if critical is already firing for same component
- source_match:
    severity: critical
  target_match:
    severity: warning
  equal: ['component', 'environment']
