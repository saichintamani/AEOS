// proto/aeos/federation/v1/federation.proto
//
// AEOS Cluster Federation API — v1
//
// Defines message types for cross-cluster token exchange, capability
// sharing, and federated task dispatch. Enables Cluster A to execute
// tasks on Cluster B using a governance token issued by A, verified
// by B via the JWKS endpoint.
//
// See: app/security/jwks.py — RemoteJWKSClient
//      app/security/token_verifier.py — TokenVerifier (federation path)

syntax = "proto3";

package aeos.federation.v1;

option go_package = "github.com/aeos/aeos-platform/gen/go/aeos/federation/v1;federationv1";
option java_package = "io.aeos.federation.v1";
option java_outer_classname = "FederationProto";

import "google/protobuf/timestamp.proto";
import "aeos/core/v1/task.proto";
import "aeos/core/v1/worker.proto";

// ── Cluster Identity ───────────────────────────────────────────────────────

// Public identity of an AEOS cluster (shared during federation handshake).
message ClusterIdentity {
  string cluster_id   = 1;
  string display_name = 2;
  string region       = 3;

  // URL of the JWKS endpoint — remote clusters fetch public keys here.
  // Format: https://<host>/.well-known/jwks.json
  string jwks_url = 4;

  // Scheduler gRPC endpoint for federated task dispatch.
  string scheduler_endpoint = 5;

  // Software version (semver).
  string version = 6;

  google.protobuf.Timestamp registered_at = 7;
}

// ── Handshake ──────────────────────────────────────────────────────────────

// Initiating cluster → remote cluster during federation setup.
message FederationHandshakeRequest {
  ClusterIdentity initiator = 1;

  // Supported algorithms: "RS256", "ES256"
  repeated string supported_algorithms = 2;

  // Minimum token TTL the initiator will accept when verifying remote tokens.
  uint32 min_token_ttl_seconds = 3;
}

message FederationHandshakeResponse {
  ClusterIdentity responder = 1;

  // Algorithms the responder will use for token issuance.
  repeated string accepted_algorithms = 2;

  // Federation session token (signed by responder, presented with future RPCs).
  string session_token = 3;

  google.protobuf.Timestamp expires_at = 4;
}

// ── Federated Task Dispatch ────────────────────────────────────────────────

// Dispatching a task from one cluster to another.
message FederatedTaskRequest {
  // The task to execute on the remote cluster.
  aeos.core.v1.Task task = 1;

  // Identity of the originating cluster (for audit).
  string originating_cluster_id = 2;

  // Federation session token — proves the caller is a trusted peer.
  string federation_session_token = 3;

  // Callback URL/endpoint for result delivery (optional; if empty, poll).
  string result_callback_endpoint = 4;
}

message FederatedTaskResponse {
  string task_id              = 1;
  string remote_task_id       = 2;   // ID assigned by the remote cluster
  string remote_worker_id     = 3;

  google.protobuf.Timestamp dispatched_at     = 4;
  google.protobuf.Timestamp estimated_start   = 5;
}

// ── Capability Exchange ────────────────────────────────────────────────────

// Request the remote cluster's current capability set (for scheduling decisions).
message GetRemoteCapabilitiesRequest {
  string requesting_cluster_id  = 1;
  string federation_session_token = 2;
}

message RemoteCapabilitySummary {
  string cluster_id = 1;

  // Number of currently idle workers.
  uint32 idle_workers = 2;

  // Aggregate capabilities across the fleet.
  aeos.core.v1.WorkerCapabilities aggregate_capabilities = 3;

  // Task types available on this cluster.
  repeated string available_task_types = 4;

  google.protobuf.Timestamp sampled_at = 5;
}

// ── Federation Service ─────────────────────────────────────────────────────

service FederationService {
  // Establish a federated trust relationship between two clusters.
  rpc Handshake(FederationHandshakeRequest) returns (FederationHandshakeResponse);

  // Dispatch a task from the calling cluster to this cluster for execution.
  rpc DispatchFederatedTask(FederatedTaskRequest) returns (FederatedTaskResponse);

  // Query this cluster's available capacity (for federated scheduling decisions).
  rpc GetRemoteCapabilities(GetRemoteCapabilitiesRequest) returns (RemoteCapabilitySummary);

  // Stream live federation events (task acceptance, completion, errors).
  rpc WatchFederationEvents(GetRemoteCapabilitiesRequest) returns (stream FederatedTaskResponse);
}
