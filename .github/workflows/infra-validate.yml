name: Infrastructure Validation

on:
  pull_request:
    paths:
    - 'infrastructure/**'
    - 'app/**'
    - 'aeos/**'
    - 'requirements.txt'
    - 'pyproject.toml'
    - 'Makefile'
  push:
    branches: [main, staging]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to validate'
        required: false
        default: 'staging'
        type: choice
        options: [dev, staging, production]

permissions:
  contents: read
  pull-requests: write
  security-events: write

concurrency:
  group: infra-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:

  ## ── Helm Chart Validation ─────────────────────────────────────────────
  helm-validate:
    name: Helm Chart
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Helm
      uses: azure/setup-helm@v4
      with:
        version: v3.14.0

    - name: Add Bitnami repo
      run: |
        helm repo add bitnami https://charts.bitnami.com/bitnami
        helm repo update

    - name: Helm dependency update
      run: helm dependency update infrastructure/helm/aeos

    - name: Helm lint (default values)
      run: helm lint infrastructure/helm/aeos

    - name: Helm lint (local values)
      run: helm lint infrastructure/helm/aeos -f infrastructure/helm/aeos/values-local.yaml

    - name: Helm lint (staging values)
      run: helm lint infrastructure/helm/aeos -f infrastructure/helm/aeos/values-staging.yaml

    - name: Helm template render check
      run: |
        helm template aeos infrastructure/helm/aeos \
          --namespace aeos-api \
          --set global.environment=ci \
          --set api.image.tag=test \
          --set worker.image.tag=test \
          > /tmp/rendered.yaml
        echo "Rendered $(wc -l < /tmp/rendered.yaml) lines"

    - name: Install kubeval
      run: |
        wget -q https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
        tar xf kubeval-linux-amd64.tar.gz
        sudo mv kubeval /usr/local/bin/

    - name: Kubeval rendered manifests
      run: |
        kubeval /tmp/rendered.yaml \
          --ignore-missing-schemas \
          --kubernetes-version 1.29.0 \
          --strict

    - name: Trivy config scan (Helm)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: config
        scan-ref: infrastructure/helm/aeos
        exit-code: '1'
        severity: HIGH,CRITICAL

  ## ── Terraform Validation ──────────────────────────────────────────────
  terraform-validate:
    name: Terraform
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, staging, production]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.7.0

    - name: Terraform fmt check
      run: terraform fmt -check -recursive infrastructure/terraform

    - name: Terraform init (no backend)
      working-directory: infrastructure/terraform/environments/${{ matrix.environment }}
      run: terraform init -backend=false -input=false

    - name: Terraform validate
      working-directory: infrastructure/terraform/environments/${{ matrix.environment }}
      run: terraform validate

    - name: Validate all modules
      run: |
        for mod in infrastructure/terraform/modules/*/; do
          echo "Validating module: $mod"
          cd "$mod"
          terraform init -backend=false -input=false -no-color &>/dev/null
          terraform validate -no-color
          cd - &>/dev/null
        done

    - name: Trivy IaC scan (Terraform)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: config
        scan-ref: infrastructure/terraform/environments/${{ matrix.environment }}
        exit-code: '1'
        severity: HIGH,CRITICAL

  ## ── Kubernetes Manifest Validation ────────────────────────────────────
  k8s-validate:
    name: Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: v1.29.0

    - name: Install kubeval
      run: |
        wget -q https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
        tar xf kubeval-linux-amd64.tar.gz
        sudo mv kubeval /usr/local/bin/

    - name: Kubeval base manifests
      run: |
        kubeval infrastructure/kubernetes/base/*.yaml \
          --ignore-missing-schemas \
          --kubernetes-version 1.29.0 \
          --strict

    - name: Install kube-score
      run: |
        wget -q https://github.com/zegl/kube-score/releases/download/v1.18.0/kube-score_1.18.0_linux_amd64.tar.gz
        tar xf kube-score_1.18.0_linux_amd64.tar.gz
        sudo mv kube-score /usr/local/bin/

    - name: kube-score (api deployment)
      run: |
        kube-score score infrastructure/kubernetes/base/api-deployment.yaml \
          --ignore-test=container-image-pull-policy \
          --ignore-test=container-image-tag \
          --exit-one-on-warning=false

    - name: kube-score (worker deployment)
      run: |
        kube-score score infrastructure/kubernetes/base/worker-deployment.yaml \
          --ignore-test=container-image-pull-policy \
          --ignore-test=container-image-tag \
          --exit-one-on-warning=false

    - name: Check default-deny NetworkPolicy
      run: |
        if grep -r "podSelector: {}" infrastructure/kubernetes/base/network-policy.yaml | grep -q "policyTypes"; then
          echo "✓ Default-deny NetworkPolicy present"
        else
          echo "✗ Default-deny NetworkPolicy missing" && exit 1
        fi

    - name: Trivy config scan (K8s)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: config
        scan-ref: infrastructure/kubernetes
        exit-code: '1'
        severity: HIGH,CRITICAL

  ## ── Application Validation ────────────────────────────────────────────
  app-validate:
    name: Application
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install --quiet -r requirements.txt
        pip install --quiet ruff mypy

    - name: Ruff lint
      run: ruff check app/ aeos/ --output-format=github

    - name: Python type check
      run: mypy app/ aeos/ --ignore-missing-imports --no-error-summary
      continue-on-error: true   # Type errors are warnings in CI

    - name: Run unit tests
      run: |
        pip install --quiet pytest pytest-asyncio
        python -m pytest tests/unit/ -q --tb=short

    - name: Check for hardcoded secrets
      run: |
        # Fail if any YAML contains literal secrets (not env vars or placeholders)
        if grep -rE 'password\s*:\s*["\x27][^"\x27${}]{8,}["\x27]' \
            infrastructure/ --include="*.yaml" \
            | grep -v "example\|placeholder\|REPLACE\|YOUR_"; then
          echo "Hardcoded secrets found!" && exit 1
        fi
        echo "✓ No hardcoded secrets"

  ## ── Full validate.sh ──────────────────────────────────────────────────
  full-validate:
    name: Full Validation Script
    runs-on: ubuntu-latest
    needs: [helm-validate, terraform-validate, k8s-validate, app-validate]
    steps:
    - uses: actions/checkout@v4

    - name: Set up tools
      uses: azure/setup-helm@v4
      with:
        version: v3.14.0

    - uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.7.0

    - uses: azure/setup-kubectl@v4
      with:
        version: v1.29.0

    - name: Run validate.sh
      run: |
        chmod +x scripts/validate.sh
        bash scripts/validate.sh ${{ github.event.inputs.environment || 'staging' }}

    - name: Post validation summary to PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.find(c => c.body.includes('AEOS Infrastructure Validation'));
          const body = `## ✅ AEOS Infrastructure Validation Passed

          | Check | Status |
          |-------|--------|
          | Helm Chart | ✅ |
          | Terraform | ✅ |
          | K8s Manifests | ✅ |
          | Application | ✅ |
          | Security Scan | ✅ |

          Safe to merge. Run \`helm upgrade --install\` or \`terraform apply\` after merge.`;

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }
