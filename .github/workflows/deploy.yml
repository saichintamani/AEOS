name: Deploy

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]
      image_tag:
        description: 'Image tag to deploy (default: git sha)'
        required: false

permissions:
  id-token: write   # OIDC for AWS auth
  contents: read

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false   # Never cancel a running deploy

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  IMAGE_TAG: ${{ github.event.inputs.image_tag || github.sha }}

jobs:

  ## ── Build and Push Container Images ──────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      short_sha: ${{ steps.meta.outputs.version }}
    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_CICD_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ${{ env.ECR_REGISTRY }}/aeos/api
          ${{ env.ECR_REGISTRY }}/aeos/worker
        tags: |
          type=sha,prefix=sha-,format=short
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push API image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile
        target: api
        push: true
        tags: ${{ env.ECR_REGISTRY }}/aeos/api:sha-${{ github.sha }},${{ env.ECR_REGISTRY }}/aeos/api:latest
        cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/aeos/api:buildcache
        cache-to: type=registry,ref=${{ env.ECR_REGISTRY }}/aeos/api:buildcache,mode=max
        labels: |
          org.opencontainers.image.revision=${{ github.sha }}
          org.opencontainers.image.created=${{ github.event.repository.updated_at }}

    - name: Build and push Worker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile
        target: worker
        push: true
        tags: ${{ env.ECR_REGISTRY }}/aeos/worker:sha-${{ github.sha }},${{ env.ECR_REGISTRY }}/aeos/worker:latest
        cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/aeos/worker:buildcache
        cache-to: type=registry,ref=${{ env.ECR_REGISTRY }}/aeos/worker:buildcache,mode=max

    - name: Trivy image scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.ECR_REGISTRY }}/aeos/api:sha-${{ github.sha }}
        exit-code: '1'
        severity: CRITICAL
        ignore-unfixed: true

  ## ── Deploy to Staging ─────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: staging
      url: https://api-staging.aeos.example.com
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'
    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_CICD_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: aws eks update-kubeconfig --name aeos-staging --region ${{ env.AWS_REGION }}

    - name: Set up Helm
      uses: azure/setup-helm@v4
      with:
        version: v3.14.0

    - name: Helm upgrade (staging)
      run: |
        helm upgrade --install aeos infrastructure/helm/aeos \
          --namespace aeos-api \
          --create-namespace \
          -f infrastructure/helm/aeos/values-staging.yaml \
          --set global.imageRegistry=${{ env.ECR_REGISTRY }} \
          --set api.image.tag=sha-${{ github.sha }} \
          --set worker.image.tag=sha-${{ github.sha }} \
          --set global.environment=staging \
          --atomic \
          --timeout 10m \
          --wait

    - name: Smoke test staging
      run: |
        sleep 15
        STATUS=$(curl -sf https://api-staging.aeos.example.com/health | jq -r '.status')
        if [ "$STATUS" = "healthy" ]; then
          echo "✓ Staging health check passed"
        else
          echo "✗ Staging health check failed: $STATUS"
          exit 1
        fi

        # Validate invariants
        VALIDATION=$(curl -sf https://api-staging.aeos.example.com/api/v1/validation/status | jq -r '.overall_status')
        if [ "$VALIDATION" = "healthy" ]; then
          echo "✓ Invariant engine healthy"
        else
          echo "⚠ Invariant engine: $VALIDATION"
        fi

  ## ── Deploy to Production ──────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    environment:
      name: production
      url: https://api.aeos.example.com
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'production'
    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_CICD_PROD_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig (production)
      run: aws eks update-kubeconfig --name aeos-production --region ${{ env.AWS_REGION }}

    - name: Set up Helm
      uses: azure/setup-helm@v4
      with:
        version: v3.14.0

    - name: Helm upgrade (production) — rolling deploy
      run: |
        helm upgrade --install aeos infrastructure/helm/aeos \
          --namespace aeos-api \
          --create-namespace \
          -f infrastructure/helm/aeos/values-production.yaml \
          --set global.imageRegistry=${{ env.ECR_REGISTRY }} \
          --set api.image.tag=sha-${{ github.sha }} \
          --set worker.image.tag=sha-${{ github.sha }} \
          --set global.environment=production \
          --atomic \
          --timeout 15m \
          --wait \
          --cleanup-on-fail

    - name: Production smoke tests
      run: |
        sleep 30

        # Health check
        STATUS=$(curl -sf https://api.aeos.example.com/health | jq -r '.status')
        [[ "$STATUS" == "healthy" ]] || { echo "Health check failed: $STATUS"; exit 1; }
        echo "✓ Health: $STATUS"

        # Readiness check
        READY=$(curl -sf https://api.aeos.example.com/health/ready | jq -r '.status')
        [[ "$READY" == "ready" ]] || { echo "Readiness check failed: $READY"; exit 1; }
        echo "✓ Ready: $READY"

        # Metrics endpoint
        METRICS=$(curl -sf https://api.aeos.example.com/metrics | head -5)
        [[ -n "$METRICS" ]] || { echo "Metrics endpoint empty"; exit 1; }
        echo "✓ Metrics endpoint serving"

        # Validation status
        curl -sf https://api.aeos.example.com/api/v1/validation/status | jq .
        echo "✓ Validation endpoint responding"

    - name: Verify rollout
      run: |
        kubectl rollout status deployment/aeos-api -n aeos-api --timeout=5m
        kubectl rollout status deployment/aeos-worker -n aeos-jobs --timeout=5m
        echo "✓ All deployments rolled out successfully"

    - name: Annotate deployment in Grafana
      if: success()
      run: |
        curl -s -X POST \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer ${{ secrets.GRAFANA_API_KEY }}" \
          -d "{\"text\":\"Deployed sha-${{ github.sha }} to production\",\"tags\":[\"deployment\",\"production\"]}" \
          https://grafana.aeos.example.com/api/annotations || true

    - name: Rollback on failure
      if: failure()
      run: |
        echo "Deployment failed — rolling back..."
        helm rollback aeos --namespace aeos-api --wait
        echo "Rollback complete"
